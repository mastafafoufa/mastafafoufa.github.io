<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mastafa Foufa — MHF</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://mastafafoufa.com/en/" />
  <link rel="alternate" hreflang="en"        href="https://mastafafoufa.com/en/" />
  <link rel="alternate" hreflang="fr"        href="https://mastafafoufa.com/fr/" />
  <link rel="alternate" hreflang="x-default" href="https://mastafafoufa.com/en/" />

  <meta http-equiv="refresh" content="0; url=/en/">
  <script>
    (function() {
      var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
      if (lang.startsWith('fr')) {
        window.location.replace('/fr/');
      } else {
        window.location.replace('/en/');
      }
    })();
  </script>

  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; background: #FAFAF8; color: #1C1C1A; }
    .gateway { text-align: center; }
    .logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 6px; margin-bottom: 2rem; }
    .gateway a { display: inline-block; margin: 0 1rem; font-size: 0.9rem; font-weight: 700;
                 text-decoration: none; color: #1A5276; }
    .gateway a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="gateway">
    <div class="logo">MHF</div>
    <a href="/en/">English</a>
    <span style="color:#7A7872">·</span>
    <a href="/fr/">Français</a>
  </div>
</body>
</html>
