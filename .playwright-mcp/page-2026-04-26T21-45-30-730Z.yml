        - generic [ref=e37]: Launch price · €20 instead of €23.50
        - generic [ref=e38]: La paresse de penser
        - generic [ref=e39]: The Laziness of Thinking — The Great Intellectual Resignation in the Age of AI
        - generic [ref=e40]: FYP Éditions — Preface by Luc Julia, co-creator of Siri
        - paragraph [ref=e41]:
          - text: Language models anticipate our next words. Recommendation algorithms outpace our desires. Autonomous agents are increasingly making decisions on our behalf.
          - text: Grounded in years of building the systems themselves — from developing large-scale NLP solutions at Microsoft to teaching AI architectures at EPITA Paris —
          - emphasis [ref=e42]: La paresse de penser
          - text: steps back to observe a profound shift in our relationship with technology. It explores the subtle process through which we consent, often unknowingly, to let machines do the thinking for us. Instead of blaming the algorithms, the book examines our own tendency to trade cognitive effort for seamless convenience.
          - text: Neither a doomsday warning nor a naive tech utopia, this book is a manual for cognitive self-defence. An invitation to slow down, design for friction, and fiercely reclaim what we choose to stop thinking about.
