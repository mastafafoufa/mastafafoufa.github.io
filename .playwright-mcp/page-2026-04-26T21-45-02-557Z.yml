  - main [ref=e29]:
    - heading "Le propos" [level=2] [ref=e30]
    - generic [ref=e31]:
      - paragraph [ref=e32]: Cet essai n'est pas un pamphlet contre l'intelligence artificielle. C'est un manuel d'autodéfense intellectuelle pour l'ère générative.
      - paragraph [ref=e33]:
        - text: Nourri par près d'une décennie d'expérience technique — de la conception de systèmes NLP à grande échelle chez Microsoft à l'enseignement de ces architectures à l'EPITA —
        - emphasis [ref=e34]: La Paresse de penser
        - text: prend du recul pour observer une mutation profonde de notre rapport à la technologie. Le livre explore cette mécanique subtile par laquelle nous consentons, souvent sans le savoir, à laisser les machines penser à notre place, troquant notre effort cognitif contre le confort de l'immédiateté.
      - paragraph [ref=e35]: Ni technophobe ni techno-béat, cet essai est une invitation urgente à réhabiliter le doute. Un appel à ralentir, à réintroduire de la friction dans nos usages, et à reconquérir farouchement le territoire de l'intention.
    - heading "L'Auteur" [level=2] [ref=e36]
    - generic [ref=e37]:
      - img "Mastafa Foufa" [ref=e39]
      - generic [ref=e40]:
        - paragraph [ref=e41]:
          - text: Je suis ingénieur et scientifique, formé à
          - strong [ref=e42]: Télécom Paris
          - text: ", une des grandes écoles d'ingénieurs, avant de rejoindre"
          - strong [ref=e43]: Microsoft à Redmond
          - text: où je suis aujourd'hui
          - strong [ref=e44]: Scientifique Appliqué Senior
          - text: . Je vis à Seattle. Mon travail quotidien consiste à concevoir des systèmes de traitement du langage naturel à grande échelle — des systèmes utilisés par des dizaines de millions de personnes dans le monde.
        - paragraph [ref=e45]: "Neuf brevets en intelligence artificielle ponctuent cette trajectoire : personnalisation des interfaces, détection d'anomalies comportementales, évaluation du bien-être numérique. Mais plus j'ai avancé dans la construction de ces systèmes, plus une question insistante s'est imposée : à quel moment cesse-t-on de construire des outils, et commence-t-on à construire des tuteurs cognitifs ?"
        - paragraph [ref=e46]:
          - text: J'ai enseigné les architectures des grands modèles de langage à
          - strong [ref=e47]: l'EPITA Paris
          - text: de 2021 à 2023, avant de quitter la France pour les États-Unis. J'ai également suivi un master en apprentissage automatique à
          - strong [ref=e48]: KTH Stockholm
          - text: ", avec une spécialisation en architectures d'apprentissage profond."
        - paragraph [ref=e49]:
          - text: En dehors des serveurs et des salles de cours, je suis
          - strong [ref=e50]: ceinture noire de judo
          - text: et deux fois champion national de karaté jutsu. Je surfe sur les côtes sauvages du Pacific Northwest.
