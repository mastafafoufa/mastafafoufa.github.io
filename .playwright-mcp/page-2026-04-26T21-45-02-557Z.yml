      - paragraph [ref=e17]: La grande démission intellectuelle face à l'IA
      - paragraph [ref=e18]: FYP Éditions — Préface de Luc Julia
      - paragraph [ref=e19]:
        - text: Les modèles de langage anticipent nos phrases. Les algorithmes de recommandation devancent nos désirs. Déjà, des agents autonomes se préparent à prendre des décisions complexes à notre place.
        - text: "Face à cette fulgurance technique, une question inconfortable s'impose : à quel moment la commodité technologique se transforme-t-elle en atrophie cognitive ? Sommes-nous en train de déléguer, non seulement nos tâches, mais notre capacité même à raisonner ?"
